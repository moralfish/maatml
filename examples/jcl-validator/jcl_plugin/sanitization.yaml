rules:
  - name: ipv4
    pattern: '\b\d{1,3}(?:\.\d{1,3}){3}\b'
    replacement: '0.0.0.0'
    applies_to: [jcl]
    length_preserving: true

  - name: userid_assignment
    pattern: '\b(USER|USERID|TSO)=([A-Z0-9@#$]{1,8})'
    replacement: '\1=REDACT'
    applies_to: [jcl]
    length_preserving: true
