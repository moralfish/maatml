rules:
  - name: ipv4
    pattern: '\b\d{1,3}(?:\.\d{1,3}){3}\b'
    replacement: '0.0.0.0'
    applies_to: [spool]
    length_preserving: true

  - name: userid_assignment
    pattern: '\b(USER|USERID|TSO)=([A-Z0-9@#$]{1,8})'
    replacement: '\1=REDACT'
    applies_to: [spool]
    length_preserving: true

  - name: cred_hint
    pattern: '(?i)\b(password|passwd|secret|token|apikey|api_key)\s*[:=]\s*\S+'
    replacement: '\1=REDACTED'
    applies_to: [spool]
    length_preserving: false

  - name: hostname_fqdn
    pattern: '\b(?=[A-Za-z])[A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+){2,}\b'
    replacement: 'HOST.REDACTED'
    applies_to: [spool]
    length_preserving: false

  - name: userid_word
    pattern: '(?i)\b(user|userid|tsoid)\s+([A-Z0-9@#$]{1,8})\b'
    replacement: '\1 REDACT'
    applies_to: [spool]
    length_preserving: false
