# Support ticket triage — causal LoRA SFT example.
#
# Takes a raw customer support ticket and emits structured triage JSON:
# { priority, category, team, summary }.
# Smoke-friendly Qwen3-0.6B; swap base_model for real runs.

name: support-ticket-triage
model_id: support-ticket-triage
task: support_ticket_triage
architecture: causal_sft
version: 0.1.0
description: "LoRA SFT example: triage a support ticket into priority/category/team/summary JSON."
base_model: Qwen/Qwen3-0.6B

plugins: [./triage_plugin]

dataset:
  format: jsonl_seed
  seed: 7
  schema: datasets/schema.json
  prompt_spec: datasets/prompt_spec.json
  seed_samples: datasets/samples/seed_samples.jsonl
  benchmark_samples: datasets/samples/test_prompt_set.jsonl
  request_field: request
  target_field: expected_output
  user_placeholder: "<<USER_REQUEST>>"
  group_by: family
  split_ratios: [0.5, 0.25, 0.25]
  sanitize: []

evaluation:
  predictor: causal_sft
  validator: triage
  metrics: triage
  # The routing gate (category → team) is the out-of-model contract; the
  # accuracy gates are deliberately modest for a small LoRA on a tiny corpus.
  gates:
    json_parse_rate: 0.95
    schema_conformance_rate: 0.90
    routing_consistency_rate: 0.85
    category_accuracy: 0.70

training:
  model_id: Qwen/Qwen3-0.6B
  max_input_tokens: 512
  batch_size: 1
  grad_accum: 1
  learning_rate: 1.0e-4
  epochs: 1
  weight_decay: 0.0
  warmup_ratio: 0.0
  seed: 7
  precision: bf16
  # Qwen3 pads its embedding matrix (151936) larger than the tokenizer vocab
  # (151669); the extra rows are unused, so reuse them as-is (no resize).
  embedding_strategy: reuse
  grad_checkpointing: false
  eval_steps: 9999
  save_steps: 50
  logging_steps: 1
  max_steps: 4
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: [q_proj, v_proj]

smoke:
  max_steps: 2
  epochs: 1
  batch_size: 1
  # Smoke tier for `maatml run --smoke`. Two steps on a handful of rows cannot
  # earn the production gates above, and pretending otherwise would teach
  # people to ignore a red gate. What a rehearsal can prove is that the
  # pipeline itself works: the checkpoint saved, reloaded, and produced output
  # for at least half the eval rows. Runs gated at this tier are marked
  # smoke_gated in the run record and the export manifest.
  gates:
    output_nonempty_rate: 0.5

# Data flywheel: `maatml distill` labels this prompt pool with a teacher, gated
# by the same validator eval and serve use. A recorded cache ships alongside so
# `maatml distill . --replay` reproduces the accepted corpus offline (CI), and
# so the example needs no API key. One prompt's recorded label routes billing to
# the wrong team; the routing contract rejects it, so it never reaches seeds.
distill:
  prompt_source: datasets/distill/prompts.jsonl
  teacher_model: recorded-teacher
  teacher_revision: "2026-07"
  cache: datasets/distill/cache.jsonl
  family: distill

packaging:
  max_input_tokens: 512
  expected_latency_ms: 2000
  weights_dtype: f16
