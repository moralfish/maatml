# Local hooks. Install with: pip install pre-commit && pre-commit install
#
# Optional (not enabled by default): add gitleaks for secret scanning —
#   https://github.com/gitleaks/gitleaks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
