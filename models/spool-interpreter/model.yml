# Spool Interpreter - LoRA-tuned Qwen3-1.7B that turns sanitized z/OS spool
# output into a structured SpoolInterpretation JSON:
# { summary, status, returnCode, rootCause, suggestedFix, confidence }.
#
# Task: spool_interpretation
# Runtime: candle (CandleGenerativeBackend in flow-studio's flow-model-runtime)
# Spec:    docs/flow_inference_model_training_instructions.md (per FlowGraphGenerator template)
#
# Architecture: pure SFT on 3-message conversations (system/user/assistant).
# Bumped from SmolLM2-360M to Qwen3-1.7B for cross-toolchain consistency
# with FlowGraphGenerator + JCL Validator. Quality jumps materially on
# the 12-category root-cause classification + structured JSON output.
# Latency goes from <100 ms (SmolLM2) → ~1-2 s (Qwen3-1.7B) — acceptable
# for post-job interpretation.
#
# Cross-platform target: Mac / Windows / Linux with 16 GB RAM minimum.

name: spool-interpreter
model_id: spool-interpreter:v1
task: spool_interpretation
runtime: candle
version: v1
description: "LoRA-tuned Qwen3-1.7B that interprets z/OS job spool output into a structured SpoolInterpretation JSON."
base_model: Qwen/Qwen3-1.7B

data:
  seed: 7331
  prompt_spec: datasets/prompt_spec.json
  schema: datasets/spool_interpretation_schema.json
  contracts: datasets/node_contracts.json
  seed_samples: datasets/samples/seed_samples.jsonl
  benchmark_samples: datasets/samples/test_prompt_set.jsonl
  raw_field: request
  split_ratios: [0.8, 0.1, 0.1]

training:
  model_id: Qwen/Qwen3-1.7B
  max_input_tokens: 4096
  batch_size: 2
  grad_accum: 8
  learning_rate: 1.0e-4
  epochs: 4
  weight_decay: 0.01
  warmup_ratio: 0.05
  seed: 7331
  precision: bf16
  grad_checkpointing: false
  eval_steps: 9999
  save_steps: 200
  logging_steps: 20
  max_steps: -1
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

smoke:
  base_model: Qwen/Qwen3-0.6B
  max_input_tokens: 2048
  batch_size: 1
  grad_accum: 2
  learning_rate: 5.0e-4
  epochs: 1
  weight_decay: 0.0
  warmup_ratio: 0.0
  precision: bf16
  grad_checkpointing: false
  eval_steps: 5
  save_steps: 5
  logging_steps: 2
  max_steps: 6
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: [q_proj, k_proj, v_proj, o_proj]

packaging:
  max_input_tokens: 4096
  expected_latency_ms: 1500
  weights_dtype: f16
  confidence_thresholds:
    high: 0.9
    low: 0.6
