# Spool Interpreter - LoRA-tuned SmolLM2 that turns sanitized z/OS spool output
# into a structured failure interpretation: { failure_category, root_cause, suggested_fix }.
#
# Task: spool_interpretation
# Runtime: candle (CandleGenerativeBackend)
#
# Consolidated from:
#   configs/spool_interpreter/data.yaml
#   configs/spool_interpreter/train.yaml
#   configs/spool_interpreter/train_smoke.yaml

name: spool-interpreter
model_id: spool-interpreter:v1
task: spool_interpretation
runtime: candle
version: v1
description: "LoRA-tuned SmolLM2 that interprets z/OS job spool output into a structured failure summary."
base_model: HuggingFaceTB/SmolLM2-360M-Instruct

# Data preparation: hand-authored seed corpus, hash-stable splits.
data:
  seed: 7331
  schema: datasets/schema.json
  prompt_spec: datasets/prompt_spec.json
  seed_samples: datasets/samples/seed_samples.jsonl
  raw_field: raw_spool
  split_ratios: [0.6, 0.2, 0.2]

# Training: SmolLM2-360M base + LoRA r=16 on q/k/v/o projections.
training:
  model_id: HuggingFaceTB/SmolLM2-360M-Instruct
  max_input_tokens: 2048
  batch_size: 1
  grad_accum: 8
  learning_rate: 2.0e-5
  epochs: 5
  weight_decay: 0.01
  warmup_ratio: 0.05
  seed: 7331
  precision: fp32
  grad_checkpointing: true
  eval_steps: 50
  save_steps: 50
  logging_steps: 5
  max_steps: -1
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

# Smoke: SmolLM2-135M, 6 optimizer steps for CI sanity.
smoke:
  base_model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_input_tokens: 1024
  batch_size: 1
  grad_accum: 2
  learning_rate: 5.0e-4
  epochs: 1
  weight_decay: 0.0
  warmup_ratio: 0.0
  precision: fp32
  grad_checkpointing: false
  eval_steps: 5
  save_steps: 5
  logging_steps: 2
  max_steps: 6
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: [q_proj, k_proj, v_proj, o_proj]

packaging:
  max_input_tokens: 2048
  expected_latency_ms: 1500
  confidence_thresholds:
    high: 0.9
    low: 0.6
