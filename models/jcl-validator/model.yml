# JCL Validator - LoRA-tuned Qwen3-1.7B that emits structured JCL validation
# results from sanitized JCL input.
#
# Task: jcl_validation
# Runtime: candle (CandleGenerativeBackend in flow-studio's flow-model-runtime)
# Spec:    docs/flow_inference_model_training_instructions.md (per FlowGraphGenerator template)
#
# Architecture: pure SFT on 3-message conversations (system/user/assistant).
# Replaces the previous multi-head BERT classifier. Latency goes from ~100 ms
# (BERT) → ~1-2 s (Qwen3-1.7B SFT) — acceptable for a one-shot pre-submit
# validation step. Quality + interpretability win: model emits a structured
# JclValidationResult JSON with line numbers, severities, and suggestions
# instead of opaque classifier outputs.
#
# Cross-platform target: Mac / Windows / Linux with 16 GB RAM minimum.
# Qwen3-1.7B at fp16 packs to ~3.4 GB on disk and ~4-5 GB total runtime.

name: jcl-validator
model_id: jcl-validator:v1
task: jcl_validation
runtime: candle
version: v1
description: "LoRA-tuned Qwen3-1.7B that emits JclValidationResult JSON from sanitized JCL input."
base_model: Qwen/Qwen3-1.7B

data:
  seed: 1337
  prompt_spec: datasets/prompt_spec.json
  schema: datasets/jcl_validation_schema.json
  contracts: datasets/node_contracts.json
  seed_samples: datasets/samples/seed_samples.jsonl
  benchmark_samples: datasets/samples/test_prompt_set.jsonl
  raw_field: request
  split_ratios: [0.8, 0.1, 0.1]

training:
  model_id: Qwen/Qwen3-1.7B
  max_input_tokens: 4096
  # v3 at batch_size 2 / bf16 produced grad_norm=8.6e13 and an MPS
  # segfault at step 20 on the 1000-sample corpus. Same class of bug
  # FGG hit earlier; matching FGG's stable config (batch_size 1,
  # grad_accum 16, fp32) here too. ~2x slower per step but reliable.
  batch_size: 1
  grad_accum: 16
  learning_rate: 1.0e-4
  # epochs 6 on the ~1000-sample corpus (v3): the 4-epoch v2 model
  # exhibited token-level mode collapse on rare error codes; more
  # passes give the model time to internalise minority categories.
  epochs: 6
  weight_decay: 0.01
  warmup_ratio: 0.05
  seed: 1337
  precision: fp32
  grad_checkpointing: false
  eval_steps: 9999
  save_steps: 200
  logging_steps: 20
  max_steps: -1
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

smoke:
  base_model: Qwen/Qwen3-0.6B
  max_input_tokens: 2048
  batch_size: 1
  grad_accum: 2
  learning_rate: 5.0e-4
  epochs: 1
  weight_decay: 0.0
  warmup_ratio: 0.0
  precision: bf16
  grad_checkpointing: false
  eval_steps: 5
  save_steps: 5
  logging_steps: 2
  max_steps: 6
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: [q_proj, k_proj, v_proj, o_proj]

packaging:
  max_input_tokens: 4096
  expected_latency_ms: 1500
  weights_dtype: f16
  confidence_thresholds:
    high: 0.9
    low: 0.6
