# DSL Generator - LoRA-tuned coder base that translates plain-English flow
# descriptions into canonical Flow DSL.
#
# Task: dsl_generation
# Runtime: candle (CandleGenerativeBackend)
#
# Phase 4b shifted the base from SmolLM2 (360M / 1.7B) to a 7B-class coder
# base (Qwen2.5-Coder-7B-Instruct). The runtime supports both `model_type:
# llama` and `model_type: qwen2` safetensors packages; quantized GGUF is
# deferred until candle exposes per-call cache reset on quantized_qwen2.
#
# F16 packaging (set in `packaging.weights_dtype` below) cuts the on-disk
# weights from ~28 GB (F32) to ~14 GB and the runtime memory footprint
# proportionally - fits a 7B base on a 16-32 GB Mac. Tooling on the runtime
# side (flow-model-runtime) reads `weights_dtype` from the package manifest
# and passes the matching `candle_core::DType` to
# `VarBuilder::from_mmaped_safetensors`.

name: dsl-generator
model_id: dsl-generator:v1
task: dsl_generation
runtime: candle
version: v1
description: "LoRA-tuned Qwen2.5-Coder-7B that converts plain-English descriptions into canonical Flow DSL."
base_model: Qwen/Qwen2.5-Coder-7B-Instruct

# Data preparation: hand-authored seeds + rule-based augmentation -> ~3500
# samples after the Phase 4c corpus expansion.
data:
  seed: 7331
  schema: datasets/schema.json
  prompt_spec: datasets/prompt_spec.json
  seed_samples: datasets/samples/seed_samples.jsonl
  raw_field: description
  split_ratios: [0.6, 0.2, 0.2]
  augment:
    target_count: 3500
    seed: 42
    out: datasets/samples/augmented_samples.jsonl

# Training: Qwen2.5-Coder-7B + LoRA on attention + MLP projections.
#
# Why these knobs:
#   - batch_size 1 with grad_accum 16: 7B activations on MPS at
#     max_input_tokens=1024 with grad_checkpointing OFF require this
#     micro-batch shape; effective batch is 16.
#   - learning_rate 1e-4: standard LoRA rate for a frozen 7B base.
#     Up from 2e-5 (which was tuned for SmolLM2-360M); the LoRA-only
#     parameter count scales linearly with base width, so the effective
#     update size at 1e-4 here is comparable to 2e-5 at 360M.
#   - epochs 3: ~3.5k augmented rows on a 7B base is plenty.
#   - target_modules expanded to MLP gate/up/down: Qwen2.5-Coder benefits
#     materially from MLP LoRA in addition to attention; SmolLM2 didn't,
#     which is why the previous list was attention-only.
training:
  model_id: Qwen/Qwen2.5-Coder-7B-Instruct
  max_input_tokens: 1024
  batch_size: 1
  grad_accum: 16
  learning_rate: 1.0e-4
  epochs: 3
  weight_decay: 0.01
  warmup_ratio: 0.05
  seed: 7331
  precision: fp32
  grad_checkpointing: true
  eval_steps: 9999       # mid-training eval disabled on MPS (memory pressure)
  save_steps: 200
  logging_steps: 20
  max_steps: -1
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# Smoke profile: keeps the SmolLM2-135M tiny base for fast pre-flight on
# laptops without the 7B weights downloaded. Smoke training is for pipeline
# validation, not quality - the produced model is intentionally bad.
smoke:
  base_model: HuggingFaceTB/SmolLM2-135M-Instruct
  max_input_tokens: 1024
  batch_size: 1
  grad_accum: 2
  learning_rate: 5.0e-4
  epochs: 1
  weight_decay: 0.0
  warmup_ratio: 0.0
  precision: fp32
  grad_checkpointing: false
  eval_steps: 5
  save_steps: 5
  logging_steps: 2
  max_steps: 6
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: [q_proj, k_proj, v_proj, o_proj]

# Packaging: ship F16 safetensors so the .fm archive stays around 14 GB.
# `weights_dtype` is mirrored verbatim into the manifest so the runtime
# loads with the matching `candle_core::DType`.
packaging:
  max_input_tokens: 1024
  expected_latency_ms: 2000
  weights_dtype: f16
  confidence_thresholds:
    high: 0.9
    low: 0.6
