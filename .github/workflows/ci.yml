name: ci

on:
  push:
    branches: [main, flow-init]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests scripts examples
      - name: Mypy
        run: mypy src/maatml --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ examples/ -q
      - name: Validate model scaffolds
        run: |
          python scripts/validate_repo.py
          maatml validate examples/jcl-validator
          maatml validate examples/spool-interpreter
          maatml validate examples/support-ticket-triage
          maatml validate examples/vision
          maatml validate examples/vision-describer
          maatml validate examples/vision-vlm

  ml-smoke:
    # Proves the real [ml] path runs end to end on CPU: prepare -> smoke train
    # -> evaluate exercises trainer construction, LoRA, checkpoint save, the
    # predictor, and the triage validator + metrics on the real
    # torch/transformers/peft stack. It swaps in a tiny random base model so it
    # proves the wiring in seconds instead of downloading and training
    # Qwen3-0.6B; it does not assert output quality (no --gate).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install (CPU torch + ml extra)
        run: |
          python -m pip install --upgrade pip
          # CPU wheel only — avoids pulling the multi-GB CUDA build.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,ml]"
      - name: Smoke train + evaluate triage on CPU (tiny model)
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          # Tiny random Llama (a few MB, shares q_proj/v_proj with Qwen so the
          # triage LoRA config applies) keeps this a proof of the pipeline, not
          # a full train. The example's model.yml still targets Qwen3-0.6B.
          TINY=hf-internal-testing/tiny-random-LlamaForCausalLM
          maatml prepare  examples/support-ticket-triage/
          maatml train    examples/support-ticket-triage/ --smoke --device cpu \
            --set training.model_id="$TINY"
          maatml evaluate examples/support-ticket-triage/ --device cpu

  standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel only (no editable) and exercise CLI
        run: |
          python -m pip install dist/*.whl
          maatml --help
          maatml plugins
          TMPDIR="$(mktemp -d)"
          maatml scaffold "$TMPDIR/my-model" --architecture causal_sft --name my-model
          maatml validate "$TMPDIR/my-model"
          test -f "$TMPDIR/my-model/model.yml"
          test -f "$TMPDIR/my-model/README.md"
          test -f "$TMPDIR/my-model/datasets/samples/seed_samples.jsonl"
          # Core wheel must NOT ship example sanitization rules.
          python -c "from importlib.resources import files; import importlib.util; assert importlib.util.find_spec('maatml.data') is not None; import pathlib; root = pathlib.Path(files('maatml')); assert not (root / 'data' / 'sanitization.yaml').exists()"
