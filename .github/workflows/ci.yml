name: ci

on:
  push:
    branches: [main, flow-init]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests scripts examples
      - name: Mypy
        run: mypy src/maatml --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # -rs prints the reason for every skip: the torch-gated tests must be
      # visibly skipped here, not silently absent.
      - name: Pytest
        run: pytest tests/ examples/ -q -rs
      - name: Validate model scaffolds
        run: |
          python scripts/validate_repo.py
          maatml validate examples/jcl-validator
          maatml validate examples/spool-interpreter
          maatml validate examples/support-ticket-triage
          maatml validate examples/vision
          maatml validate examples/vision-describer
          maatml validate examples/vision-vlm
      - name: Offline distill replay (no network, no torch)
        run: |
          # Exit criterion: distill --replay reproduces the accepted corpus from
          # the shipped cache with the network disabled. Writes to a temp seed
          # file so the committed corpus is untouched.
          maatml distill examples/support-ticket-triage --replay --no-append \
            --out /tmp/distill_replay.jsonl
          python - <<'PY'
          import json
          rows = [json.loads(x) for x in open("/tmp/distill_replay.jsonl")]
          teams = {r["expected_output"]["team"] for r in rows}
          # Three valid labels enter; the billing->platform label is rejected.
          assert len(rows) == 3, rows
          assert teams == {"payments", "identity", "docs"}, teams
          print("distill replay reproduced", len(rows), "gated rows offline")
          PY

  macos:
    # Torch-free job (free minutes on a public repo): catches import, path,
    # and CLI regressions that only show up off Linux. Local development
    # already exercises MPS, so no [ml] extra here.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ examples/ -q -rs
      - name: CLI smoke
        run: |
          maatml --help
          maatml plugins
          maatml validate examples/support-ticket-triage

  windows:
    # Torch-free job: catches path handling (backslashes, drive letters),
    # encoding, and console assumptions that only fail off POSIX.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ examples/ -q -rs
      - name: CLI smoke
        run: |
          maatml --help
          maatml plugins
          maatml validate examples/support-ticket-triage

  ml-smoke:
    # Proves the real [ml] path runs end to end on CPU. `maatml run --smoke`
    # walks prepare -> train -> evaluate (smoke-tier gates) -> export -> verify
    # on the real torch/transformers/peft stack, then re-runs to prove the
    # pipeline is idempotent. Model quality is not asserted: the smoke tier
    # gates on prediction coverage, not on task accuracy.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install (CPU torch + ml/vision extras)
        run: |
          python -m pip install --upgrade pip
          # CPU wheels only — avoids pulling the multi-GB CUDA build. Both
          # come from the CPU index so the [vision] extra does not drag the
          # CUDA torch back in as a torchvision dependency.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,ml,vision]"
      # The torch-gated tests (trainers, the vision end-to-end) only run where
      # torch is installed; the matrix job skips them.
      - name: Pytest with torch (tests + examples)
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: pytest tests/ examples/ -q -rs
      - name: Lifecycle run on CPU (tiny model, smoke tier)
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          # One command: prepare -> train -> evaluate (smoke-tier gates) ->
          # export -> verify. A tiny random Llama (a few MB, shares
          # q_proj/v_proj with Qwen so the triage LoRA config applies) keeps
          # this a proof of the pipeline, not a full train; the example's
          # model.yml still targets Qwen3-0.6B. The smoke tier gates on
          # prediction coverage, so a broken checkpoint fails here.
          TINY=hf-internal-testing/tiny-random-LlamaForCausalLM
          maatml run examples/support-ticket-triage/ --smoke --device cpu \
            --set training.model_id="$TINY"
          # Idempotence: a second run with nothing changed does no work.
          maatml run examples/support-ticket-triage/ --smoke --device cpu \
            --set training.model_id="$TINY" | tee rerun.log
          grep -q "ran=nothing (all fresh)" rerun.log
          # The bundle records that its gate pass came from the smoke tier.
          python - <<'PY'
          import glob, json
          manifest = json.load(open(sorted(glob.glob(
              "examples/support-ticket-triage/output/export/*/manifest.json"))[-1]))
          evidence = manifest["gate_evidence"]
          assert evidence["passed"] and evidence["smoke_gated"], evidence
          print("gate evidence:", evidence)
          PY

  standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel only (no editable) and exercise CLI
        run: |
          python -m pip install dist/*.whl
          maatml --help
          maatml plugins
          TMPDIR="$(mktemp -d)"
          maatml scaffold "$TMPDIR/my-model" --architecture causal_sft --name my-model
          maatml validate "$TMPDIR/my-model"
          test -f "$TMPDIR/my-model/model.yml"
          test -f "$TMPDIR/my-model/README.md"
          test -f "$TMPDIR/my-model/datasets/samples/seed_samples.jsonl"
          # Core wheel must NOT ship example sanitization rules.
          python -c "from importlib.resources import files; import importlib.util; assert importlib.util.find_spec('maatml.data') is not None; import pathlib; root = pathlib.Path(files('maatml')); assert not (root / 'data' / 'sanitization.yaml').exists()"
