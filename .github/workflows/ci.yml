name: ci

on:
  push:
    branches: [main, flow-init]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests scripts examples
      - name: Mypy
        run: mypy src/maatml --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ examples/ -q
      - name: Validate model scaffolds
        run: |
          python scripts/validate_repo.py
          maatml validate examples/jcl-validator
          maatml validate examples/spool-interpreter
          maatml validate examples/support-ticket-triage
          maatml validate examples/vision
          maatml validate examples/vision-describer
          maatml validate examples/vision-vlm

  ml-smoke:
    # Exercises the real training stack on CPU end to end: prepare -> smoke
    # train -> evaluate the validator + metrics on support-ticket-triage. The
    # rest of CI is intentionally torch-free; this is the one job that proves
    # the [ml] path and the example's gates plumbing actually run.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install (CPU torch + ml extra)
        run: |
          python -m pip install --upgrade pip
          # CPU wheel only — avoids pulling the multi-GB CUDA build.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,ml]"
      - name: Smoke train + evaluate triage on CPU
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          maatml prepare  examples/support-ticket-triage/
          maatml train    examples/support-ticket-triage/ --smoke --device cpu
          # No --gate: a 2-step smoke model will not meet the gates. This still
          # exercises the triage validator + metrics on a real checkpoint.
          maatml evaluate examples/support-ticket-triage/ --device cpu

  standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel only (no editable) and exercise CLI
        run: |
          python -m pip install dist/*.whl
          maatml --help
          maatml plugins
          TMPDIR="$(mktemp -d)"
          maatml scaffold "$TMPDIR/my-model" --architecture causal_sft --name my-model
          maatml validate "$TMPDIR/my-model"
          test -f "$TMPDIR/my-model/model.yml"
          test -f "$TMPDIR/my-model/README.md"
          test -f "$TMPDIR/my-model/datasets/samples/seed_samples.jsonl"
          # Core wheel must NOT ship example sanitization rules.
          python -c "from importlib.resources import files; import importlib.util; assert importlib.util.find_spec('maatml.data') is not None; import pathlib; root = pathlib.Path(files('maatml')); assert not (root / 'data' / 'sanitization.yaml').exists()"
